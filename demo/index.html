<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Howdz CAD - 演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Microsoft YaHei', sans-serif;
      background: #1a1a1a;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* 顶部菜单栏 */
    .menu-bar {
      height: 32px;
      background: #2d2d2d;
      border-bottom: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
    }
    .menu-item {
      color: #ccc;
      font-size: 13px;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    .menu-item:hover {
      background: #3a3a3a;
    }

    /* 主体区域 */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* 左侧工具栏 */
    .toolbar {
      width: 48px;
      background: #252525;
      border-right: 1px solid #3a3a3a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 4px;
    }
    .tool-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      cursor: pointer;
      color: #aaa;
      font-size: 11px;
      border: none;
      background: transparent;
    }
    .tool-btn:hover {
      background: #3a3a3a;
      color: #fff;
    }
    .tool-btn.active {
      background: #0078d4;
      color: #fff;
    }
    .tool-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    .tool-divider {
      width: 28px;
      height: 1px;
      background: #3a3a3a;
      margin: 4px 0;
    }

    /* 绘图区域 */
    .canvas-area {
      flex: 1;
      position: relative;
    }
    #cad-container {
      width: 100%;
      height: 100%;
    }

    /* 右侧属性面板 */
    .properties-panel {
      width: 220px;
      background: #252525;
      border-left: 1px solid #3a3a3a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      font-size: 12px;
      color: #ccc;
    }
    .properties-panel.hidden {
      display: none;
    }
    .panel-header {
      padding: 8px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #3a3a3a;
      font-size: 13px;
      font-weight: bold;
      color: #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header .close-btn {
      cursor: pointer;
      color: #888;
      font-size: 16px;
      line-height: 1;
    }
    .panel-header .close-btn:hover {
      color: #fff;
    }
    .panel-section {
      padding: 8px 12px;
      border-bottom: 1px solid #2a2a2a;
    }
    .panel-section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .prop-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      line-height: 1.6;
    }
    .prop-label {
      color: #999;
    }
    .prop-value {
      color: #ddd;
      font-family: 'Consolas', monospace;
    }
    .panel-empty {
      padding: 20px 12px;
      text-align: center;
      color: #555;
      font-size: 12px;
    }

    /* 底部命令行 */
    .command-line {
      height: 28px;
      background: #252525;
      border-top: 1px solid #3a3a3a;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .command-prompt {
      color: #999;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      margin-right: 8px;
    }
    .command-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ddd;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      outline: none;
    }

    /* 命令历史 */
    .command-history {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      max-height: 200px;
      overflow-y: auto;
      background: #1e1e1e;
      border-top: 1px solid #3a3a3a;
      padding: 4px 10px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #888;
      display: none;
    }
    .command-history.visible {
      display: block;
    }
    .command-history .history-line {
      padding: 1px 0;
    }
    .command-history .history-line.error {
      color: #e06060;
    }
    .command-history .history-line.success {
      color: #60c060;
    }

    /* 提示浮层 */
    .hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #555;
      font-size: 14px;
      pointer-events: none;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- 顶部菜单栏 -->
    <div class="menu-bar">
      <div class="menu-item">文件</div>
      <div class="menu-item">编辑</div>
      <div class="menu-item">视图</div>
      <div class="menu-item">绘图</div>
      <div class="menu-item">修改</div>
      <div class="menu-item">帮助</div>
    </div>

    <!-- 主体区域 -->
    <div class="main">
      <!-- 左侧工具栏 -->
      <div class="toolbar">
        <button class="tool-btn active" id="tool-select" title="选择 (Esc)">
          <svg viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" id="tool-line" title="直线 (L)">
          <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="tool-btn" id="tool-circle" title="圆形 (C)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="tool-btn" id="tool-arc" title="圆弧 (A)">
          <svg viewBox="0 0 24 24"><path d="M12 4a8 8 0 0 1 0 16" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" id="tool-move" title="移动 (M)">
          <svg viewBox="0 0 24 24"><path d="M12 2l4 4h-3v4h4V7l4 4-4 4v-3h-4v4h3l-4 4-4-4h3v-4H7v3l-4-4 4-4v3h4V6H8l4-4z" fill="currentColor"/></svg>
        </button>
        <button class="tool-btn" id="tool-copy" title="复制 (CO)">
          <svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="1" stroke="currentColor" stroke-width="2" fill="none"/><path d="M4 16V5a1 1 0 0 1 1-1h11" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="tool-btn" id="tool-erase" title="删除 (E / Delete)">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" id="tool-fillet" title="倒圆角 (F)">
          <svg viewBox="0 0 24 24"><path d="M4 20V10a6 6 0 0 1 6-6h4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="tool-btn" id="tool-chamfer" title="倒角 (CHA)">
          <svg viewBox="0 0 24 24"><path d="M4 20L10 14h4l6-6" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button class="tool-btn" id="tool-extend" title="延伸 (EX)">
          <svg viewBox="0 0 24 24"><path d="M4 20h16M8 4v12" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 12l4-4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
      </div>

      <!-- 绘图区域 -->
      <div class="canvas-area">
        <div id="cad-container"></div>
      </div>

      <!-- 右侧属性面板 -->
      <div class="properties-panel" id="properties-panel">
        <div class="panel-header">
          <span>属性</span>
          <span class="close-btn" id="panel-close" title="关闭面板">×</span>
        </div>
        <div id="panel-content">
          <div class="panel-empty">未选中图元</div>
        </div>
      </div>
    </div>

    <!-- 底部命令行 -->
    <div class="command-line">
      <span class="command-prompt" id="command-prompt">命令:</span>
      <input class="command-input" id="command-input" type="text" placeholder="输入命令 (LINE, CIRCLE, ARC, COPY, MOVE, FILLET, CHAMFER, EXTEND, ERASE)..." />
    </div>
    <div class="command-history" id="command-history"></div>
  </div>

  <script type="module">
    import { HowdzCAD } from '../src/index.ts';

    const cad = new HowdzCAD({
      container: '#cad-container',
      showGrid: true,
      showAxes: true,
    });

    // 暴露到全局供调试
    window.cad = cad;

    // 命令行交互
    const commandInput = document.getElementById('command-input');
    const commandHistory = document.getElementById('command-history');
    const commandPrompt = document.getElementById('command-prompt');
    const historyLines = [];

    function addHistory(text, type = '') {
      const line = document.createElement('div');
      line.className = 'history-line' + (type ? ' ' + type : '');
      line.textContent = text;
      commandHistory.appendChild(line);
      commandHistory.scrollTop = commandHistory.scrollHeight;
      historyLines.push({ text, type });
    }

    // 命令历史记录
    let commandHistoryList = [];
    let historyIndex = -1;

    /**
     * 获取命令执行反馈信息
     * 根据命令类型返回具体的操作描述
     */
    function getCommandFeedback(cmdLine) {
      const trimmed = cmdLine.trim();
      const spaceIndex = trimmed.indexOf(' ');
      const cmd = (spaceIndex === -1 ? trimmed : trimmed.substring(0, spaceIndex)).toUpperCase();
      const args = spaceIndex === -1 ? '' : trimmed.substring(spaceIndex + 1).trim();

      switch (cmd) {
        case 'LINE':
        case 'L':
          if (args) return '已绘制直线';
          return '已切换到直线工具';
        case 'CIRCLE':
        case 'C':
          if (args) return '已绘制圆形';
          return '已切换到圆形工具';
        case 'ARC':
        case 'A':
          if (args) return '已绘制圆弧';
          return '已切换到圆弧工具';
        case 'SELECT':
        case 'SEL':
          return '已切换到选择工具';
        case 'COPY':
        case 'CO':
          return '已切换到复制工具';
        case 'MOVE':
        case 'M':
          return '已切换到移动工具';
        case 'FILLET':
        case 'F':
          if (args && args.toUpperCase().startsWith('R')) {
            return '已设置圆角半径';
          }
          return '已切换到倒圆角工具';
        case 'CHAMFER':
        case 'CHA':
          if (args && args.toUpperCase().startsWith('D')) {
            return '已设置倒角距离';
          }
          return '已切换到倒角工具';
        case 'EXTEND':
        case 'EX':
          return '已切换到延伸工具';
        case 'ERASE':
        case 'E':
          if (args.toUpperCase() === 'ALL') return '已清除全部图元';
          if (args.toUpperCase() === 'U' || args.toUpperCase() === 'UNDO') return '已撤销删除';
          return '已删除选中图元';
        default:
          return '命令已执行';
      }
    }

    commandInput.addEventListener('keydown', (e) => {
      // 阻止事件传播到CAD的键盘处理
      e.stopPropagation();

      if (e.key === 'Enter') {
        const value = commandInput.value.trim();
        if (!value) return;

        // 添加到历史
        commandHistoryList.push(value);
        historyIndex = commandHistoryList.length;

        // 显示输入
        addHistory(`> ${value}`);

        // 执行命令并获取反馈
        const feedback = getCommandFeedback(value);
        const result = cad.executeCommand(value);
        if (result) {
          addHistory(feedback, 'success');
        } else {
          addHistory('未知命令: ' + value, 'error');
        }

        commandInput.value = '';
        commandHistory.classList.add('visible');
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex > 0) {
          historyIndex--;
          commandInput.value = commandHistoryList[historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex < commandHistoryList.length - 1) {
          historyIndex++;
          commandInput.value = commandHistoryList[historyIndex];
        } else {
          historyIndex = commandHistoryList.length;
          commandInput.value = '';
        }
      } else if (e.key === 'Escape') {
        commandInput.blur();
        commandHistory.classList.remove('visible');
      }
    });

    // 聚焦命令行时显示历史
    commandInput.addEventListener('focus', () => {
      if (historyLines.length > 0) {
        commandHistory.classList.add('visible');
      }
    });

    // 点击画布时隐藏历史并聚焦画布
    document.getElementById('cad-container').addEventListener('mousedown', () => {
      commandHistory.classList.remove('visible');
    });

    // 工具栏按钮交互
    const toolBtns = document.querySelectorAll('.tool-btn');
    const toolManager = cad.getToolManager();

    function setActiveButton(toolName) {
      toolBtns.forEach(btn => btn.classList.remove('active'));
      const btn = document.getElementById('tool-' + toolName);
      if (btn) btn.classList.add('active');
    }

    // 监听工具切换
    toolManager.onToolChange = (name) => {
      setActiveButton(name);
      const prompts = { line: '直线:', circle: '圆形:', arc: '圆弧:', select: '选择:', copy: '复制:', move: '移动:', fillet: '倒圆角:', chamfer: '倒角:', extend: '延伸:' };
      commandPrompt.textContent = prompts[name] || '命令:';
    };

    // 工具栏按钮点击
    document.getElementById('tool-select')?.addEventListener('click', () => {
      toolManager.setActiveTool('select');
    });
    document.getElementById('tool-line')?.addEventListener('click', () => {
      toolManager.setActiveTool('line');
    });
    document.getElementById('tool-circle')?.addEventListener('click', () => {
      toolManager.setActiveTool('circle');
    });
    document.getElementById('tool-arc')?.addEventListener('click', () => {
      toolManager.setActiveTool('arc');
    });
    document.getElementById('tool-copy')?.addEventListener('click', () => {
      toolManager.setActiveTool('copy');
    });
    document.getElementById('tool-move')?.addEventListener('click', () => {
      toolManager.setActiveTool('move');
    });
    document.getElementById('tool-fillet')?.addEventListener('click', () => {
      toolManager.setActiveTool('fillet');
    });
    document.getElementById('tool-chamfer')?.addEventListener('click', () => {
      toolManager.setActiveTool('chamfer');
    });
    document.getElementById('tool-extend')?.addEventListener('click', () => {
      toolManager.setActiveTool('extend');
    });
    document.getElementById('tool-erase')?.addEventListener('click', () => {
      const count = cad.eraseSelected();
      if (count > 0) {
        updatePropertyPanel();
        addHistory(`已删除 ${count} 个图元`, 'success');
      } else {
        addHistory('未选中图元', 'error');
      }
    });

    // ========== 多键快捷键缓冲 ==========
    let keyBuffer = '';
    let keyBufferTimer = null;
    const KEY_BUFFER_TIMEOUT = 500; // ms

    function clearKeyBuffer() {
      keyBuffer = '';
      if (keyBufferTimer) {
        clearTimeout(keyBufferTimer);
        keyBufferTimer = null;
      }
    }

    function processKeyBuffer() {
      const seq = keyBuffer.toUpperCase();
      clearKeyBuffer();

      switch (seq) {
        case 'CO':
          toolManager.setActiveTool('copy');
          addHistory('已切换到复制工具', 'success');
          return true;
        case 'CHA':
          toolManager.setActiveTool('chamfer');
          addHistory('已切换到倒角工具', 'success');
          return true;
        case 'EX':
          toolManager.setActiveTool('extend');
          addHistory('已切换到延伸工具', 'success');
          return true;
        default:
          return false;
      }
    }

    // 键盘快捷键（命令行未聚焦时生效）
    document.addEventListener('keydown', (e) => {
      // 命令行聚焦时不处理快捷键
      if (document.activeElement === commandInput) return;

      const key = e.key.toLowerCase();

      // Ctrl 组合键优先处理（不进入多键缓冲）
      if (e.ctrlKey) {
        // Ctrl+C 复制
        if (key === 'c') {
          e.preventDefault();
          clearKeyBuffer();
          const selected = cad.getEntityManager().getSelected();
          if (selected.length > 0) {
            window._cadClipboard = selected.map(e => e.clone());
            addHistory(`已复制 ${selected.length} 个图元`, 'success');
          }
          return;
        }

        // Ctrl+V 粘贴
        if (key === 'v') {
          e.preventDefault();
          clearKeyBuffer();
          if (window._cadClipboard && window._cadClipboard.length > 0) {
            const em = cad.getEntityManager();
            for (const entity of window._cadClipboard) {
              em.add(entity.clone());
            }
            em.clearSelection();
            addHistory(`已粘贴 ${window._cadClipboard.length} 个图元`, 'success');
          }
          return;
        }

        // Ctrl+Z 撤销
        if (key === 'z') {
          e.preventDefault();
          clearKeyBuffer();
          const count = cad.undo();
          if (count > 0) {
            updatePropertyPanel();
            addHistory(`已撤销，恢复 ${count} 个图元`, 'success');
          }
          return;
        }

        // Ctrl+Y 重做
        if (key === 'y') {
          e.preventDefault();
          clearKeyBuffer();
          const count = cad.redo();
          if (count > 0) {
            updatePropertyPanel();
            addHistory(`已重做，删除 ${count} 个图元`, 'success');
          }
          return;
        }

        // Ctrl+S 保存DXF
        if (key === 's') {
          e.preventDefault();
          clearKeyBuffer();
          addHistory('保存功能待实现 (DXF导出)', 'error');
          return;
        }

        // Ctrl+O 打开DXF
        if (key === 'o') {
          e.preventDefault();
          clearKeyBuffer();
          addHistory('打开功能待实现 (DXF导入)', 'error');
          return;
        }

        return; // 其他 Ctrl 组合键忽略
      }

      // 功能键处理
      if (e.key === 'F8') {
        e.preventDefault();
        clearKeyBuffer();
        const ortho = toolManager.toggleOrtho();
        addHistory(`正交模式: ${ortho ? '开' : '关'}`, 'success');
        return;
      }

      if (e.key === 'F3') {
        e.preventDefault();
        clearKeyBuffer();
        const snap = toolManager.toggleSnap();
        addHistory(`捕捉模式: ${snap ? '开' : '关'}`, 'success');
        return;
      }

      // Escape 回到选择工具
      if (e.key === 'Escape') {
        clearKeyBuffer();
        toolManager.setActiveTool('select');
        return;
      }

      // Delete 键删除选中图元
      if (e.key === 'Delete') {
        clearKeyBuffer();
        const count = cad.eraseSelected();
        if (count > 0) {
          updatePropertyPanel();
          addHistory(`已删除 ${count} 个图元`, 'success');
        }
        return;
      }

      // 单字母快捷键（直接映射）
      const singleKeyMap = {
        'l': 'line',
        'c': 'circle',
        'a': 'arc',
        'm': 'move',
        'f': 'fillet',
        'e': null, // 特殊处理：E 直接删除
      };

      if (singleKeyMap.hasOwnProperty(key)) {
        // E 键直接删除选中图元
        if (key === 'e') {
          clearKeyBuffer();
          const count = cad.eraseSelected();
          if (count > 0) {
            updatePropertyPanel();
            addHistory(`已删除 ${count} 个图元`, 'success');
          }
          return;
        }

        // 检查是否是多键序列的起始字符
        // C 可能是 CO 的开始，A 可能是 ARC 的开始（但 A 已经是圆弧）
        // 只有 C 需要等待看是否后面跟着 O
        if (key === 'c') {
          keyBuffer += key;
          if (keyBufferTimer) clearTimeout(keyBufferTimer);
          keyBufferTimer = setTimeout(() => {
            // 超时：当作单键 C 处理（圆形工具）
            if (keyBuffer === 'c') {
              toolManager.setActiveTool('circle');
            }
            clearKeyBuffer();
          }, KEY_BUFFER_TIMEOUT);
          return;
        }

        // 其他单键直接激活工具
        clearKeyBuffer();
        toolManager.setActiveTool(singleKeyMap[key]);
        return;
      }

      // 多键序列字符（O, H, X 等）
      if (key === 'o' || key === 'h' || key === 'x') {
        keyBuffer += key;

        if (keyBufferTimer) clearTimeout(keyBufferTimer);

        // 尝试匹配完整序列
        const upper = keyBuffer.toUpperCase();
        if (upper === 'CO' || upper === 'CHA' || upper === 'EX') {
          processKeyBuffer();
          return;
        }

        // 检查是否有匹配的前缀
        const hasPrefix = ['CO', 'CHA', 'EX'].some(seq => seq.startsWith(upper));
        if (hasPrefix) {
          // 继续等待
          keyBufferTimer = setTimeout(() => {
            // 超时：尝试处理缓冲区
            if (!processKeyBuffer()) {
              // 无法匹配，回退到第一个字符的单键映射
              const firstChar = keyBuffer[0].toLowerCase();
              if (firstChar === 'c') toolManager.setActiveTool('circle');
            }
            clearKeyBuffer();
          }, KEY_BUFFER_TIMEOUT);
          return;
        }

        // 无匹配前缀，清空缓冲并忽略
        clearKeyBuffer();
        return;
      }
    });

    // ========== 属性面板 ==========
    const panelContent = document.getElementById('panel-content');
    const propertiesPanel = document.getElementById('properties-panel');

    function formatNum(n) {
      return n.toFixed(2);
    }

    function formatAngle(rad) {
      return (rad * 180 / Math.PI).toFixed(1) + '°';
    }

    function updatePropertyPanel() {
      const selected = cad.getEntityManager().getSelected();

      if (selected.length === 0) {
        panelContent.innerHTML = '<div class="panel-empty">未选中图元</div>';
        return;
      }

      if (selected.length > 1) {
        panelContent.innerHTML = `<div class="panel-section">
          <div class="panel-section-title">选择集</div>
          <div class="prop-row"><span class="prop-label">数量</span><span class="prop-value">${selected.length}</span></div>
        </div>`;
        return;
      }

      const entity = selected[0];
      let html = '';

      // 通用属性
      html += `<div class="panel-section">
        <div class="panel-section-title">基本信息</div>
        <div class="prop-row"><span class="prop-label">类型</span><span class="prop-value">${entity.type === 'line' ? '直线' : entity.type === 'circle' ? '圆形' : '圆弧'}</span></div>
        <div class="prop-row"><span class="prop-label">图层</span><span class="prop-value">${entity.layer}</span></div>
        <div class="prop-row"><span class="prop-label">ID</span><span class="prop-value" style="font-size:10px">${entity.id}</span></div>
      </div>`;

      // 类型特有属性
      if (entity.type === 'line') {
        html += `<div class="panel-section">
          <div class="panel-section-title">直线参数</div>
          <div class="prop-row"><span class="prop-label">起点 X</span><span class="prop-value">${formatNum(entity.startX)}</span></div>
          <div class="prop-row"><span class="prop-label">起点 Y</span><span class="prop-value">${formatNum(entity.startY)}</span></div>
          <div class="prop-row"><span class="prop-label">终点 X</span><span class="prop-value">${formatNum(entity.endX)}</span></div>
          <div class="prop-row"><span class="prop-label">终点 Y</span><span class="prop-value">${formatNum(entity.endY)}</span></div>
          <div class="prop-row"><span class="prop-label">长度</span><span class="prop-value">${formatNum(entity.getLength())}</span></div>
          <div class="prop-row"><span class="prop-label">角度</span><span class="prop-value">${formatAngle(entity.getAngle())}</span></div>
        </div>`;
      } else if (entity.type === 'circle') {
        html += `<div class="panel-section">
          <div class="panel-section-title">圆形参数</div>
          <div class="prop-row"><span class="prop-label">圆心 X</span><span class="prop-value">${formatNum(entity.centerX)}</span></div>
          <div class="prop-row"><span class="prop-label">圆心 Y</span><span class="prop-value">${formatNum(entity.centerY)}</span></div>
          <div class="prop-row"><span class="prop-label">半径</span><span class="prop-value">${formatNum(entity.radius)}</span></div>
          <div class="prop-row"><span class="prop-label">周长</span><span class="prop-value">${formatNum(entity.getCircumference())}</span></div>
          <div class="prop-row"><span class="prop-label">面积</span><span class="prop-value">${formatNum(entity.getArea())}</span></div>
        </div>`;
      } else if (entity.type === 'arc') {
        html += `<div class="panel-section">
          <div class="panel-section-title">圆弧参数</div>
          <div class="prop-row"><span class="prop-label">圆心 X</span><span class="prop-value">${formatNum(entity.centerX)}</span></div>
          <div class="prop-row"><span class="prop-label">圆心 Y</span><span class="prop-value">${formatNum(entity.centerY)}</span></div>
          <div class="prop-row"><span class="prop-label">半径</span><span class="prop-value">${formatNum(entity.radius)}</span></div>
          <div class="prop-row"><span class="prop-label">起始角度</span><span class="prop-value">${formatAngle(entity.startAngle)}</span></div>
          <div class="prop-row"><span class="prop-label">终止角度</span><span class="prop-value">${formatAngle(entity.endAngle)}</span></div>
          <div class="prop-row"><span class="prop-label">弧度</span><span class="prop-value">${formatAngle(entity.getArcAngle())}</span></div>
        </div>`;
      }

      panelContent.innerHTML = html;
    }

    // 接入选择变更回调
    const selectTool = toolManager.getTool('select');
    if (selectTool) {
      selectTool.onSelectionChange = updatePropertyPanel;
    }

    // 属性面板关闭/打开
    document.getElementById('panel-close')?.addEventListener('click', () => {
      propertiesPanel.classList.toggle('hidden');
    });

    // 初始更新
    updatePropertyPanel();

    console.log('HowdzCAD 初始化完成');
    console.log('操作说明:');
    console.log('  - 鼠标滚轮: 缩放');
    console.log('  - 鼠标中键拖拽: 平移');
    console.log('快捷键:');
    console.log('  - L: 直线 | C: 圆形 | A: 圆弧');
    console.log('  - M: 移动 | CO: 复制 | E/Delete: 删除');
    console.log('  - F: 倒圆角 | CHA: 倒角 | EX: 延伸');
    console.log('  - Esc: 选择工具');
    console.log('  - F3: 捕捉模式 | F8: 正交模式');
    console.log('  - Ctrl+Z: 撤销 | Ctrl+Y: 重做');
    console.log('  - Ctrl+C: 复制到剪贴板 | Ctrl+V: 粘贴');
    console.log('  - Ctrl+S: 保存DXF | Ctrl+O: 打开DXF');
    console.log('  - 拖拽夹点可实时修改图形形状');
  </script>
</body>
</html>
